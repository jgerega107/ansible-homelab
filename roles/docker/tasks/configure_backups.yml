---
- name: Ensure rclone is installed
  ansible.builtin.package:
    name: rclone
    state: present

- name: Ensure rclone config directory exists
  ansible.builtin.file:
    path: /root/.config/rclone
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Ensure rclone SSH key directory exists
  ansible.builtin.file:
    path: /root/.ssh/rclone
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Generate SSH key for rclone
  community.crypto.openssh_keypair:
    path: /root/.ssh/rclone/id_ed25519
    type: ed25519
    size: 256
    owner: root
    group: root
    mode: "0600"
  register: docker_rclone_ssh_key

- name: Display rclone public key for remote server
  ansible.builtin.debug:
    msg: "Add this public key to the remote SFTP server: {{ docker_rclone_ssh_key.public_key }}"

- name: Configure rclone SFTP remote
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /root/.config/rclone/rclone.conf
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Ensure Prometheus textfile directory exists
  ansible.builtin.file:
    path: /var/lib/node_exporter
    state: directory
    mode: "0755"
    owner: node-exp
    group: node-exp

- name: Copy Docker volume backup script
  ansible.builtin.copy:
    src: backup_docker_volumes
    dest: /usr/local/sbin/backup_docker_volumes
    mode: "0755"
    owner: root
    group: root

- name: Copy Docker backup systemd service
  ansible.builtin.copy:
    src: docker-backup.service
    dest: /etc/systemd/system/docker-backup.service
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: Copy Docker backup systemd timer
  ansible.builtin.copy:
    src: docker-backup.timer
    dest: /etc/systemd/system/docker-backup.timer
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable and start Docker backup timer
  ansible.builtin.systemd_service:
    name: docker-backup.timer
    enabled: true
    state: started
