---
- name: Ensure Prometheus textfile directory exists
  ansible.builtin.file:
    path: /var/lib/node_exporter
    state: directory
    mode: "0755"
    owner: node-exp
    group: node-exp

- name: Copy Docker volume backup script
  ansible.builtin.copy:
    src: backup_docker_volumes
    dest: /usr/local/sbin/backup_docker_volumes
    mode: "0755"
    owner: root
    group: root

- name: Copy Docker backup systemd service
  ansible.builtin.copy:
    src: docker-backup.service
    dest: /etc/systemd/system/docker-backup.service
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: Copy Docker backup systemd timer
  ansible.builtin.copy:
    src: docker-backup.timer
    dest: /etc/systemd/system/docker-backup.timer
    mode: "0644"
    owner: root
    group: root
  notify: Reload systemd

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable and start Docker backup timer
  ansible.builtin.systemd_service:
    name: docker-backup.timer
    enabled: true
    state: started
